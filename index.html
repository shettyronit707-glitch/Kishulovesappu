<!DOCTYPE html>
<html>
<head>
<title>Happy Women's Day Appu ❤️</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#ffeef2;
}

h1{
color:#ff3b6f;
}

.container{
margin-top:40px;
}

.balloon{
width:90px;
height:110px;
border-radius:50%;
display:inline-block;
margin:25px;
cursor:pointer;
position:relative;
}

.balloon:after{
content:"";
width:2px;
height:40px;
background:black;
position:absolute;
bottom:-40px;
left:44px;
}

.red{background:red;}
.yellow{background:gold;}
.purple{background:purple;}
.orange{background:orange;}

#popup{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

#popup img{
width:260px;
border-radius:10px;
}

.close{
cursor:pointer;
font-size:20px;
float:right;
}
</style>
</head>

<body>

<h1>Happy Women's Day Appu ❤️</h1>
<p>Select the 2 photos first, then pop balloons 🎈</p>

<input type="file" id="img1">
<input type="file" id="img2">

<div class="container">

<div class="balloon red" onclick="showPhoto(1)"></div>
<div class="balloon yellow" onclick="showPhoto(2)"></div>
<div class="balloon purple" onclick="showPhoto(1)"></div>
<div class="balloon orange" onclick="showPhoto(2)"></div>

</div>

<div id="popup">
<span class="close" onclick="closePhoto()">❌</span>
<br><br>
<img id="photo">
<p>You are special Appu ❤️</p>
</div>

<script>

function showPhoto(num){
let fileInput = document.getElementById("img"+num).files[0];
if(!fileInput){ alert("Please select the photos first"); return;}

let reader = new FileReader();
reader.onload = function(e){
document.getElementById("photo").src = e.target.result;
document.getElementById("popup").style.display="block";
}
reader.readAsDataURL(fileInput);
}

function closePhoto(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
